services:
  db:
    image: mysql:8
    container_name: ruja-crm-db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql
    networks:
      - ruja-crm

  web:
    build: .
    container_name: ruja-crm-web
    restart: always
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - ruja-crm

  nginx:
    image: nginx:alpine
    container_name: ruja-crm-nginx
    restart: always
    ports:
      - "8006:80" # Puerto de entrada
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - ruja-crm

networks:
  ruja-crm:

volumes:
  mysql_data:
  static_volume:
  media_volume: